name: JumaoCat
options:
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 14.0
schemes:
  JumaoCat:
    build:
      targets:
        JumaoCat: all
        JumaoCatTests: [test]
    test:
      targets:
        - name: JumaoCatTests
targets:
  JumaoCat:
    type: application
    platform: macOS
    sources:
      - path: Sources/JumaoCat
      - path: Resources/BundledRuntime
        type: folder
        buildPhase: resources
    preBuildScripts:
      - name: Verify Bundled Jumao Runtime
        script: |
          runtime_dir="${SRCROOT}/Resources/BundledRuntime"
          prepare_script="${SRCROOT}/scripts/prepare-bundled-runtime.sh"
          if [[ ! -d "${runtime_dir}" ]] || ! "${prepare_script}" --verify-only; then
            echo "error: 缺少 Jumao 内置运行时，请先执行 prepare-bundled-runtime.sh --arch current"
            exit 1
          fi
        showEnvVars: false
        basedOnDependencyAnalysis: false
        shell: /bin/bash
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smianmian.JumaoCat
        PRODUCT_NAME: Jumao Cat
        PRODUCT_MODULE_NAME: JumaoCat
        INFOPLIST_FILE: Sources/JumaoCat/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: 0.3.1
        CURRENT_PROJECT_VERSION: 2
      configs:
        Release:
          DEVELOPMENT_TEAM: L2TYJNDTJK
          ARCHS: arm64
          ONLY_ACTIVE_ARCH: NO
          ENABLE_HARDENED_RUNTIME: YES
          CODE_SIGN_ENTITLEMENTS: Signing/JumaoCat.entitlements
  JumaoCatTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/JumaoCatTests
    dependencies:
      - target: JumaoCat
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smianmian.JumaoCatTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Jumao Cat.app/Contents/MacOS/Jumao Cat"
        BUNDLE_LOADER: "$(TEST_HOST)"
